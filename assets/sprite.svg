<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 32" width="128" height="32">
  <!--
    CSS SPRITE - TurismoWeb Jujuy
    Cada icono ocupa una celda de 32x32 px:
      Facebook  → x: 0  a 32  (background-position: 0     0)
      Instagram → x: 32 a 64  (background-position: -32px 0)
      Twitter/X → x: 64 a 96  (background-position: -64px 0)
      Email     → x: 96 a 128 (background-position: -96px 0)
  -->

  <!-- ICONO 1: Facebook (celda 0-32) -->
  <rect x="1" y="1" width="30" height="30" rx="6" ry="6" fill="#1877F2"/>
  <text x="10" y="24" fill="white" font-size="20" font-weight="bold"
        font-family="Arial, Helvetica, sans-serif">f</text>

  <!-- ICONO 2: Instagram (celda 32-64) -->
  <defs>
    <linearGradient id="igGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"   stop-color="#F58529"/>
      <stop offset="50%"  stop-color="#DD2A7B"/>
      <stop offset="100%" stop-color="#8134AF"/>
    </linearGradient>
  </defs>
  <rect x="33" y="1" width="30" height="30" rx="6" ry="6" fill="url(#igGrad)"/>
  <circle cx="48" cy="16" r="7" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="55.5" cy="9.5" r="2" fill="white"/>

  <!-- ICONO 3: Twitter / X (celda 64-96) -->
  <rect x="65" y="1" width="30" height="30" rx="6" ry="6" fill="#000000"/>
  <line x1="73" y1="10" x2="89" y2="26" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="89" y1="10" x2="73" y2="26" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- ICONO 4: Email (celda 96-128) -->
  <rect x="97" y="1" width="30" height="30" rx="6" ry="6" fill="#E67E22"/>
  <rect x="101" y="10" width="22" height="14" rx="1" fill="none" stroke="white" stroke-width="2"/>
  <polyline points="101,10 112,19 123,10" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>
</svg>
